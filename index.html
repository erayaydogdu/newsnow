<!doctype html>
<html lang="en-US" class="dark">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- SEO Meta Tags -->
  <meta name="description" content="NewsNow - A real-time news aggregator reader, gathering trending news from around the world with an elegant reading experience" />
  <meta name="keywords" content="news,tech news,real-time news,news aggregator,NewsNow" />
  <meta name="author" content="NewsNow" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="NewsNow - Elegant News Aggregator Reader" />
  <meta property="og:description" content="A real-time news aggregator reader, gathering trending news from around the world with an elegant reading experience" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://newsnow.erayaydogdu.com" />
  <meta property="og:image" content="https://newsnow.erayaydogdu.com/og-image.png" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="NewsNow - Elegant News Aggregator Reader" />
  <meta name="twitter:description" content="A real-time news aggregator reader, gathering trending news from around the world with an elegant reading experience" />
  <meta name="twitter:image" content="https://newsnow.erayaydogdu.com/og-image.svg" />

  <meta name="theme-color" content="#F14D42" />
  <link rel="preload" href="/Baloo2-Bold.subset.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />

  <!-- Schema.org markup for Google -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "NewsNow",
      "url": "https://newsnow.erayaydogdu.com",
      "description": "A real-time news aggregator reader that gathers trending news from around the world and provides an elegant reading experience.",
    }
  </script>

  <script>
    const query = new URLSearchParams(window.location.search)
    if (query.has("login") && query.has("user") && query.has("jwt")) {
      localStorage.setItem("user", query.get("user"))
      localStorage.setItem("jwt", JSON.stringify(query.get("jwt")))
      window.history.replaceState({}, document.title, window.location.pathname)
    }
  </script>
  <title>NewsNow</title>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
